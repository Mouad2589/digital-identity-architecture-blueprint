# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint

default: true

# Line length — disabled for prose; tables and code blocks already excluded
MD013: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow raw HTML (for badges)
MD033: false

# Allow multiple blank lines (common in template files)
MD012:
  maximum: 2

# GitHub PR/issue templates and CONTRIBUTING files legitimately start with H2
MD041: false

# Allow blank lines between consecutive blockquotes (README tagline + disclaimer)
MD028: false
