name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:

  # ─── Structure check ──────────────────────────────────────────────────────
  structure:
    name: Repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f docs/roadmap.md
          test -f docs/context.md
          test -f docs/modules.md
          test -f docs/security-model.md
          test -f docs/interoperability.md
          test -f docs/operational-view.md
          test -f docs/decisions/ADR-0001-public-repository-scope.md

  # ─── Markdown lint ────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: .markdownlint.yaml

  # ─── Mermaid diagram validation ───────────────────────────────────────────
  diagrams:
    name: Validate Mermaid diagrams
    runs-on: ubuntu-latest
    needs: structure
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mermaid-js CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract and validate Mermaid blocks
        run: |
          find . -name "*.md" -not -path "./.git/*" | while read file; do
            python3 - <<'PYEOF' "$file"
          import sys, re, subprocess, tempfile, os

          md = open(sys.argv[1]).read()
          blocks = re.findall(r'```mermaid\n(.*?)```', md, re.DOTALL)
          for i, block in enumerate(blocks):
              with tempfile.NamedTemporaryFile(suffix='.mmd', mode='w', delete=False) as f:
                  f.write(block)
                  tmpfile = f.name
              result = subprocess.run(['mmdc', '-i', tmpfile, '-o', '/tmp/out.svg'], capture_output=True)
              os.unlink(tmpfile)
              if result.returncode != 0:
                  print(f"::error file={sys.argv[1]}::Invalid Mermaid block #{i+1}")
                  print(result.stderr.decode())
                  sys.exit(1)
          PYEOF
          done

  # ─── Secret scan ─────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
